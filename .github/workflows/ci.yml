name: CI

# Runs the test suite on every push/PR, then runs the LLM security scanner on its
# own demo stub to prove the tool works end-to-end and to publish a governance
# package. The reusable scan job is copy-pasteable into any repo that wants to gate
# releases on model safety (keep `--fail-on` as a hard gate there).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Run tests (offline)
        run: python -m pytest -q

  llm-security-scan:
    name: LLM security scan (demo + report)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install
        run: pip install .   # installs the package + its deps; provides `llm-scan`
      # This repo scans its OWN built-in, intentionally-vulnerable demo stub, which
      # always contains Critical findings. We run the scanner end-to-end and archive
      # the governance package, but tolerate only the "findings gate fired" exit code
      # (2) so this repo's own CI stays green. A downstream repo scanning a real model
      # should keep `--fail-on CRITICAL` as a hard gate and drop the exit-code shim
      # below. To gate on a live model, set OPENAI_API_KEY in repo secrets and use
      # `--target openai`.
      - name: Run LLM security scan (demonstrates the gate, archives the report)
        run: |
          llm-scan run --target stub --out ./reports --fail-on CRITICAL || code=$?
          code=${code:-0}
          if [ "$code" -ne 0 ] && [ "$code" -ne 2 ]; then
            echo "::error::scanner errored (exit $code), not the findings gate"
            exit "$code"
          fi
          echo "scan finished (exit $code; 0=clean, 2=findings present as expected for the demo stub)"
      - name: Upload governance package
        if: always()  # keep the evidence even when the gate fails
        uses: actions/upload-artifact@v5
        with:
          name: llm-security-report
          path: reports/
